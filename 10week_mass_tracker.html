<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>10 Week Mass Tracker</title>
<style>
:root {
  --bg: #0d0f12;
  --surface: #161a1f;
  --surface2: #1e2329;
  --border: #2a3040;
  --accent: #e8b84b;
  --accent-dim: rgba(232,184,75,0.15);
  --green: #3ecf6e;
  --green-dim: rgba(62,207,110,0.12);
  --text: #f0f2f5;
  --muted: #7a8499;
  --danger: #e85555;
  --ff: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:15px;line-height:1.4}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{font-size:20px;font-weight:700;letter-spacing:.02em;color:var(--accent)}
.logo em{color:var(--text);font-style:normal}
.reset-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--ff)}
.reset-btn:active{border-color:var(--danger);color:var(--danger)}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

.layout{display:grid;grid-template-columns:180px 1fr}

.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:12px;min-height:calc(100vh - 120px)}
.sidebar-title{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;padding:0 4px}
.week-list{margin-bottom:16px}
.week-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:2px;border:1px solid transparent}
.week-item:active{background:var(--surface2);color:var(--text)}
.week-item.active{background:var(--accent-dim);color:var(--accent);border-color:rgba(232,184,75,0.3)}
.week-item.done{color:var(--green)}
.week-badge{font-size:10px;padding:1px 5px;border-radius:3px;background:var(--surface2);color:var(--muted)}
.week-item.active .week-badge{background:rgba(232,184,75,0.2);color:var(--accent)}
.week-item.done .week-badge{background:var(--green-dim);color:var(--green)}

.day-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:2px;border:1px solid transparent}
.day-item:active{background:var(--surface2);color:var(--text)}
.day-item.active{background:var(--surface2);color:var(--text);border-color:var(--border)}
.day-item.done{color:var(--green)}
.day-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0}
.day-item.done .day-dot{background:var(--green)}
.day-item.active .day-dot{background:var(--accent)}
.day-short{font-weight:700;font-size:13px;min-width:28px}
.day-name{font-size:11px;opacity:.8}

.content{padding:20px;max-width:820px}
.day-heading{font-size:22px;font-weight:700;margin-bottom:18px}
.day-heading span{color:var(--accent)}

.section-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;padding-left:2px}

.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ex-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ex-name{font-size:15px;font-weight:600}
.superset-tag{font-size:10px;color:var(--accent);background:var(--accent-dim);padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border:1px solid rgba(232,184,75,0.3)}

.sets-hdr{display:grid;grid-template-columns:30px 1fr 1fr 32px;gap:5px;margin-bottom:4px}
.sets-hdr span{font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.06em;font-weight:600}

.set-row{display:grid;grid-template-columns:30px 1fr 1fr 32px;gap:5px;align-items:center;margin-bottom:4px}
.set-num{font-size:12px;color:var(--muted);text-align:center;line-height:1.2}
.set-target{font-size:9px;color:rgba(232,184,75,0.5);display:block}

.inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--ff);font-size:14px;padding:6px 4px;text-align:center;-webkit-appearance:none;appearance:none}
.inp:focus{outline:none;border-color:var(--accent)}
.inp.has-val{border-color:#3a4255}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

.check-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;line-height:1}
.check-btn:active{transform:scale(.9)}
.check-btn.checked{background:var(--green-dim);border-color:var(--green);color:var(--green)}

.note-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:var(--ff);font-size:12px;padding:6px 10px;margin-top:8px}
.note-inp:focus{outline:none;color:var(--text)}

.ex-note{font-size:11px;color:var(--accent);margin-top:6px;opacity:.8}

.finish-wrap{margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}
.finish-btn{width:100%;padding:13px;font-family:var(--ff);font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer}
.finish-btn:active{transform:scale(.99)}
.finish-btn.done{border-color:var(--green);color:var(--green);background:var(--green-dim)}

@media(max-width:600px){
  .layout{grid-template-columns:1fr}
  .sidebar{min-height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .week-list{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .week-item{margin-bottom:0}
  .day-list{display:flex;gap:4px}
  .day-item{flex-direction:column;gap:3px;padding:8px 6px;text-align:center;min-width:56px}
  .day-name{display:none}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .content{padding:14px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">10 Week <em>Mass</em> Tracker</div>
    <button class="reset-btn" onclick="resetAll()">&#8635; Reset all</button>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Week</div>
    <div class="week-list" id="weekList"></div>
    <div class="sidebar-title">Day</div>
    <div class="day-list" id="dayList"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
var DAYS = [
  {
    id:'mon', short:'MON', label:'Monday', full:'Chest & Triceps',
    sections:[
      {name:'Chest', exercises:[
        {name:'Barbell bench press', sets:['10','8','8','6']},
        {name:'Incline bench press', sets:['8','8','6']},
        {name:'Decline bench press', sets:['8','8','6']},
        {name:'Dumbbell flys', sets:['10','10']},
        {name:'Dumbbell pullover', sets:['8','8']}
      ]},
      {name:'Triceps', exercises:[
        {name:'Tricep extension', sets:['10','8','8','6'], note:'Add weight each set'},
        {name:'Tricep dip', sets:['10','10','10']},
        {name:'Tricep bench dip', sets:['8','8','8']}
      ]}
    ]
  },
  {
    id:'tue', short:'TUE', label:'Tuesday', full:'Back & Biceps',
    sections:[
      {name:'Back', exercises:[
        {name:'Deadlift', sets:['10','8','8','6','4']},
        {name:'Chin up', sets:['8','8']},
        {name:'One arm dumbbell row', sets:['8','8','8']},
        {name:'Seated row', sets:['8','8']},
        {name:'Close grip lat pulldown', sets:['10','10','8']}
      ]},
      {name:'Biceps', exercises:[
        {name:'Standing barbell curl', sets:['8','8','6']},
        {name:'Close grip preacher curl', sets:['8','8','6']},
        {name:'Incline dumbbell curl', sets:['12-14','12-14']},
        {name:'Concentration curl', sets:['10','10']}
      ]}
    ]
  },
  {
    id:'thu', short:'THU', label:'Thursday', full:'Shoulders & Forearms',
    sections:[
      {name:'Shoulders', exercises:[
        {name:'Machine shoulder press', sets:['10','10','10']},
        {name:'Dumbbell reverse fly', sets:['8-10','8-10','8-10']},
        {name:'Military press', sets:['10','10','10','10']},
        {name:'Dumbbell lateral raise', sets:['10','10']},
        {name:'Dumbbell shrugs', sets:['10','10'], superset:true},
        {name:'Upright row', sets:['10','10'], superset:true}
      ]},
      {name:'Forearms', exercises:[
        {name:'Standing wrist curl', sets:['10','10','10','10']},
        {name:'Barbell wrist curl', sets:['10','10','10','10']}
      ]}
    ]
  },
  {
    id:'fri', short:'FRI', label:'Friday', full:'Legs',
    sections:[
      {name:'Legs', exercises:[
        {name:'Squat', sets:['10','8','8','6','4']},
        {name:'Leg extension', sets:['12','12','12']},
        {name:'Leg curl', sets:['12','12','12']}
      ]},
      {name:'Calves', exercises:[
        {name:'Standing calf raise', sets:['12','12','12','12']},
        {name:'Seated calf raise', sets:['12','12']}
      ]}
    ]
  }
];

var state = {};
var currentWeek = 1;
var currentDay = 'mon';

function SK(w,d){ return 'w'+w+'_'+d; }

function getState(w,d){
  var k=SK(w,d);
  if(!state[k]) state[k]={exercises:{},done:false};
  return state[k];
}

function persist(){
  try{ localStorage.setItem('mtrk_v2', JSON.stringify({state:state,currentWeek:currentWeek,currentDay:currentDay})); }catch(e){}
}

function load(){
  try{
    var raw=localStorage.getItem('mtrk_v2');
    if(raw){ var sv=JSON.parse(raw); state=sv.state||{}; currentWeek=sv.currentWeek||1; currentDay=sv.currentDay||'mon'; }
  }catch(e){}
  renderAll();
}

function totalSessions(){
  var n=0;
  for(var w=1;w<=10;w++) for(var i=0;i<DAYS.length;i++) if(getState(w,DAYS[i].id).done) n++;
  return n;
}
function totalWeeksDone(){
  var n=0;
  for(var w=1;w<=10;w++){ var all=true; for(var i=0;i<DAYS.length;i++) if(!getState(w,DAYS[i].id).done){ all=false; break; } if(all) n++; }
  return n;
}
function currentStreak(){
  var s=0;
  outer:for(var w=10;w>=1;w--) for(var i=DAYS.length-1;i>=0;i--){ if(getState(w,DAYS[i].id).done) s++; else break outer; }
  return s;
}

function renderStats(){
  var stats=[
    {v:totalSessions(),l:'Sessions'},
    {v:totalWeeksDone()+'/10',l:'Weeks'},
    {v:Math.round(totalSessions()/40*100)+'%',l:'Progress'},
    {v:currentStreak(),l:'Streak'}
  ];
  var h='';
  for(var i=0;i<stats.length;i++) h+='<div class="stat"><div class="stat-val">'+stats[i].v+'</div><div class="stat-lbl">'+stats[i].l+'</div></div>';
  document.getElementById('statsBar').innerHTML=h;
}

function renderWeekList(){
  var h='';
  for(var w=1;w<=10;w++){
    var allDone=true;
    for(var i=0;i<DAYS.length;i++) if(!getState(w,DAYS[i].id).done){ allDone=false; break; }
    var prog=0;
    for(var i=0;i<DAYS.length;i++) if(getState(w,DAYS[i].id).done) prog++;
    var cls='week-item'+(w===currentWeek?' active':allDone?' done':'');
    h+='<div class="'+cls+'" onclick="selectWeek('+w+')">Week '+w+'<span class="week-badge">'+(allDone?'&#10003;':prog+'/4')+'</span></div>';
  }
  document.getElementById('weekList').innerHTML=h;
}

function renderDayList(){
  var h='';
  for(var i=0;i<DAYS.length;i++){
    var d=DAYS[i];
    var s=getState(currentWeek,d.id);
    var cls='day-item'+(d.id===currentDay?' active':s.done?' done':'');
    h+='<div class="'+cls+'" onclick="selectDay(\''+d.id+'\')">'
      +'<div class="day-dot"></div>'
      +'<div><div class="day-short">'+d.short+'</div><div class="day-name">'+d.label+'</div></div>'
      +'</div>';
  }
  document.getElementById('dayList').innerHTML=h;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderContent(){
  var day=null;
  for(var i=0;i<DAYS.length;i++) if(DAYS[i].id===currentDay){ day=DAYS[i]; break; }
  var s=getState(currentWeek,currentDay);
  var h='<div class="day-heading"><span>'+day.short+'</span> &mdash; '+day.full+'</div>';

  for(var si=0;si<day.sections.length;si++){
    var sec=day.sections[si];
    h+='<div class="section-lbl">'+sec.name+'</div>';
    for(var ei=0;ei<sec.exercises.length;ei++){
      var ex=sec.exercises[ei];
      var exKey=sec.name+'_'+ei;
      var exData=s.exercises[exKey]||{};
      h+='<div class="ex-card">';
      h+='<div class="ex-hdr"><div class="ex-name">'+ex.name+'</div>'+(ex.superset?'<span class="superset-tag">Superset</span>':'')+'</div>';
      h+='<div class="sets-hdr"><span>#</span><span>Weight kg</span><span>Reps</span><span></span></div>';
      for(var ni=0;ni<ex.sets.length;ni++){
        var tr=ex.sets[ni];
        var sd=exData[ni]||{};
        var wv=sd.weight||''; var rv=sd.reps||''; var ck=sd.done||false;
        h+='<div class="set-row">'
          +'<div class="set-num">'+(ni+1)+'<span class="set-target">'+tr+'</span></div>'
          +'<input class="inp'+(wv?' has-val':'')+'" type="number" min="0" step="2.5" placeholder="kg" value="'+esc(wv)+'" oninput="updSet(\''+exKey+'\','+ni+',\'weight\',this.value)">'
          +'<input class="inp'+(rv?' has-val':'')+'" type="number" min="0" placeholder="'+tr+'" value="'+esc(rv)+'" oninput="updSet(\''+exKey+'\','+ni+',\'reps\',this.value)">'
          +'<button class="check-btn'+(ck?' checked':'')+'" onclick="togSet(\''+exKey+'\','+ni+')">'+(ck?'&#10003;':'&#9675;')+'</button>'
          +'</div>';
      }
      if(ex.note) h+='<div class="ex-note">&#8505; '+ex.note+'</div>';
      h+='<input class="note-inp" placeholder="Add note..." value="'+esc(exData.note||'')+'" oninput="updNote(\''+exKey+'\',this.value)">';
      h+='</div>';
    }
  }

  var done=s.done;
  h+='<div class="finish-wrap"><button class="finish-btn'+(done?' done':'')+'" onclick="finishDay()">'
    +(done?'&#10003; Workout complete &mdash; tap to undo':'Mark workout as complete')
    +'</button></div>';

  document.getElementById('content').innerHTML=h;
}

function renderAll(){ renderStats(); renderWeekList(); renderDayList(); renderContent(); }

function selectWeek(w){ currentWeek=w; persist(); renderAll(); }
function selectDay(d){ currentDay=d; persist(); renderAll(); }

function updSet(exKey,si,field,val){
  var s=getState(currentWeek,currentDay);
  if(!s.exercises[exKey]) s.exercises[exKey]={};
  if(!s.exercises[exKey][si]) s.exercises[exKey][si]={};
  s.exercises[exKey][si][field]=val;
  persist();
}

function togSet(exKey,si){
  var s=getState(currentWeek,currentDay);
  if(!s.exercises[exKey]) s.exercises[exKey]={};
  if(!s.exercises[exKey][si]) s.exercises[exKey][si]={};
  s.exercises[exKey][si].done=!s.exercises[exKey][si].done;
  persist(); renderContent(); renderDayList(); renderStats();
}

function updNote(exKey,val){
  var s=getState(currentWeek,currentDay);
  if(!s.exercises[exKey]) s.exercises[exKey]={};
  s.exercises[exKey].note=val;
  persist();
}

function finishDay(){
  var s=getState(currentWeek,currentDay);
  s.done=!s.done;
  persist(); renderAll();
}

function resetAll(){
  if(!confirm('Delete all workout data? This cannot be undone.')) return;
  state={}; persist(); renderAll();
}

load();
</script>
</body>
</html>
